<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotivationTracker</title>
  <link rel="stylesheet" href="docs/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">MotivationTracker</h1>
      <button id="themeToggle" class="theme-toggle" title="Toggle theme">
        <i data-lucide="sun" class="icon-sun"></i>
        <i data-lucide="moon" class="icon-moon"></i>
      </button>
    </header>

    <!-- Streak -->
    <section class="card streak-card">
      <div class="streak-flame">🔥</div>
      <div class="streak-number" id="streakCount">0</div>
      <div class="streak-label">day streak</div>
    </section>

    <!-- Mood -->
    <section class="card" id="moodCard">
      <h2 class="card-title">Today's Mood</h2>
      <div id="moodPrompt">
        <div class="mood-emoji" id="moodEmoji">😊</div>
        <div class="mood-slider-wrap">
          <input type="range" id="moodSlider" min="1" max="10" value="5" class="mood-range">
        </div>
        <div class="mood-value" id="moodValueDisplay">5</div>
        <button class="btn btn-primary" id="saveMoodBtn">Save Mood</button>
      </div>
      <div id="moodLogged" class="mood-logged hidden">
        <div class="logged-emoji" id="loggedEmoji">😊</div>
        <div class="logged-value" id="loggedMoodValue">5</div>
        <div class="logged-time" id="loggedTime"></div>
        <button class="btn btn-ghost" id="updateMoodBtn">Update</button>
      </div>
    </section>

    <!-- Morning Check-in -->
    <section class="card">
      <h2 class="card-title">Morning Check-in</h2>
      <textarea id="morningText" class="textarea-field" placeholder="How did you sleep? What's on your mind today?" rows="3"></textarea>
      <button class="btn btn-primary" id="saveMorningBtn">Save</button>
      <div class="saved-note hidden" id="morningSaved">
        <i data-lucide="check-circle-2"></i> Saved
      </div>
    </section>

    <!-- Evening Reflection -->
    <section class="card">
      <h2 class="card-title">Evening Reflection</h2>
      <textarea id="eveningText" class="textarea-field" placeholder="How was your day? What went well?" rows="3"></textarea>
      <button class="btn btn-primary" id="saveEveningBtn">Save</button>
      <div class="saved-note hidden" id="eveningSaved">
        <i data-lucide="check-circle-2"></i> Saved
      </div>
    </section>

    <!-- Goals -->
    <section class="card">
      <h2 class="card-title">Goals <span class="goal-count" id="goalCount">(0/3)</span></h2>
      <div id="goalsList" class="goals-list"></div>
      <div id="addGoalForm" class="add-goal-form hidden">
        <input type="text" id="goalInput" class="text-input" placeholder="Enter your goal..." maxlength="100">
        <button class="btn btn-primary" id="confirmGoalBtn">Add</button>
        <button class="btn btn-ghost" id="cancelGoalBtn">Cancel</button>
      </div>
      <button class="btn btn-add-goal" id="addGoalBtn">+ Add Goal</button>
    </section>

    <!-- Weekly Analytics -->
    <section class="card">
      <h2 class="card-title">Weekly Mood</h2>
      <div class="chart-container">
        <canvas id="moodChart"></canvas>
      </div>
      <div class="week-summary">
        <div class="summary-stat">
          <span class="stat-value" id="avgMood">—</span>
          <span class="stat-label">Avg Mood</span>
        </div>
        <div class="summary-stat">
          <span class="stat-value" id="bestDay">—</span>
          <span class="stat-label">Best Day</span>
        </div>
        <div class="summary-stat">
          <span class="stat-value" id="loggedDays">—</span>
          <span class="stat-label">Days</span>
        </div>
      </div>
    </section>

    <!-- Quote -->
    <section class="card">
      <h2 class="card-title">Daily Motivation</h2>
      <blockquote class="quote-text" id="quoteText">Loading...</blockquote>
      <cite class="quote-author" id="quoteAuthor">—</cite>
      <button class="btn btn-refresh" id="refreshQuoteBtn">
        <i data-lucide="refresh-cw"></i> New Quote
      </button>
    </section>

  </div>

  <script src="app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
